<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Daily Van Inspection</title>
<style>
  :root{
    --navy:#0b1f3a;
    --navy-light:#13315c;
    --accent:#c9a227;
    --bg:#f4f5f7;
    --ok:#1a7a4c;
    --fail:#b3261e;
    --border:#d8dce3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:#1b1f27;
  }
  header{
    background:var(--navy);
    color:#fff;
    padding:20px 18px 16px;
  }
  header .eyebrow{
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:11px;
    color:var(--accent);
    font-weight:700;
    margin-bottom:4px;
  }
  header h1{
    margin:0;
    font-size:20px;
    line-height:1.3;
  }
  header .sub{
    font-size:13px;
    color:#c3cbdb;
    margin-top:4px;
  }
  form{
    max-width:640px;
    margin:0 auto;
    padding:16px;
  }
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    font-size:14px;
    margin:0 0 12px;
    color:var(--navy-light);
    text-transform:uppercase;
    letter-spacing:.04em;
    border-bottom:2px solid var(--accent);
    padding-bottom:6px;
  }
  label{
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:4px;
  }
  input[type=text], input[type=date], textarea, select{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:15px;
    margin-bottom:12px;
    font-family:inherit;
  }
  textarea{resize:vertical; min-height:60px;}
  .check-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eef0f3;
  }
  .check-row:last-child{border-bottom:none;}
  .check-row span{font-size:14.5px;}
  .status-btns{display:flex; gap:6px;}
  .status-btns button{
    border:1px solid var(--border);
    background:#fff;
    border-radius:6px;
    padding:6px 12px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    color:#555;
  }
  .status-btns button.ok.active{background:var(--ok); color:#fff; border-color:var(--ok);}
  .status-btns button.fail.active{background:var(--fail); color:#fff; border-color:var(--fail);}
  .submit-wrap{padding:4px 0 32px;}
  button.submit{
    width:100%;
    background:var(--navy);
    color:#fff;
    border:none;
    padding:15px;
    font-size:16px;
    font-weight:700;
    border-radius:8px;
    cursor:pointer;
  }
  button.submit:active{background:var(--navy-light);}
  .hint{
    font-size:12px;
    color:#6b7280;
    margin-top:8px;
    line-height:1.4;
  }
  input[type=file]{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
    background:#fafafa;
  }
  .photo-preview{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .photo-thumb{
    position:relative;
    width:72px;
    height:72px;
    border-radius:6px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .photo-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .photo-thumb .remove{
    position:absolute;
    top:2px;
    right:2px;
    background:rgba(0,0,0,0.65);
    color:#fff;
    border:none;
    border-radius:50%;
    width:20px;
    height:20px;
    font-size:12px;
    line-height:20px;
    text-align:center;
    padding:0;
    cursor:pointer;
  }
  .fail-count{
    display:none;
    background:#fdeceb;
    border:1px solid var(--fail);
    color:var(--fail);
    font-size:13px;
    font-weight:600;
    padding:8px 10px;
    border-radius:6px;
    margin-bottom:12px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Apex &middot; SOP-LV-005</div>
  <h1>Daily Van Inspection</h1>
  <div class="sub">Complete before first use each shift. Any FAIL item must be reported before driving.</div>
</header>

<form id="inspectionForm">

  <div
